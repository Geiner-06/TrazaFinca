name: TrazaFinca CI/CD Pipeline

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

permissions:
  contents: write # Permiso para que el bot pueda publicar en gh-pages

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Instalar dependencias
        run: npm ci

      - name: Ejecutar Tests (CI)
        run: npm test

      - name: Build del Proyecto
        run: npm run build

      # ESTO ES EL CD (Despliegue Continuo)
      - name: Deploy a GitHub Pages
        if: github.ref == 'refs/heads/main' # Solo despliega si estamos en main
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist
